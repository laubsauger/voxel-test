<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLOCKBURB</title>
    <link rel="icon" href="%BASE_URL%favicon.svg" type="image/svg+xml" />
    <link rel="preload" href="%BASE_URL%fonts/chakra-petch-700.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="%BASE_URL%fonts/chakra-petch-600.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="%BASE_URL%fonts/chakra-petch-500.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      /* boot-critical styles only — the design system lives in src/ui/style.css */
      @font-face {
        font-family: 'Chakra Petch';
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url('%BASE_URL%fonts/chakra-petch-500.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Chakra Petch';
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url('%BASE_URL%fonts/chakra-petch-600.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Chakra Petch';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('%BASE_URL%fonts/chakra-petch-700.woff2') format('woff2');
      }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #07090d; }
      #app { width: 100%; height: 100%; }
      #fatal {
        position: fixed; inset: 0; display: none; place-items: center; z-index: 1000;
        color: #ff6a5e; background: rgba(5, 6, 9, 0.94);
        font: 500 15px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
        padding: 24px; text-align: center; white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- ui-root: all DOM overlay UI (preloader / menu / hud / settings) mounts here -->
    <div id="ui-root"></div>
    <!-- dev stats line — kept for the CDP smoke test; styled by the dev overlay -->
    <div id="hud"></div>
    <div id="fatal"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
