<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLOCKBURB</title>
    <link rel="icon" href="%BASE_URL%favicon.svg" type="image/svg+xml" />
    <link rel="preload" href="%BASE_URL%fonts/chakra-petch-700.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="%BASE_URL%fonts/chakra-petch-600.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="%BASE_URL%fonts/chakra-petch-500.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      /* boot-critical styles only — the design system lives in src/ui/style.css */
      @font-face {
        font-family: 'Chakra Petch';
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url('%BASE_URL%fonts/chakra-petch-500.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Chakra Petch';
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url('%BASE_URL%fonts/chakra-petch-600.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Chakra Petch';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('%BASE_URL%fonts/chakra-petch-700.woff2') format('woff2');
      }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #07090d; }
      #app { width: 100%; height: 100%; }
      #fatal {
        position: fixed; inset: 0; display: none; place-items: center; z-index: 1000;
        color: #ff6a5e; background: rgba(5, 6, 9, 0.94);
        font: 500 15px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
        padding: 24px; text-align: center; white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- T91 — static splash: pure HTML/CSS, paints DURING script download/parse/
         compile (the JS preloader used to be the first paint — a 5-10s grey tab).
         The Preloader removes it the moment it mounts. -->
    <div id="boot-splash" style="position:fixed;inset:0;z-index:999;display:grid;place-items:center;background:#07090d">
      <div style="text-align:center;font-family:'Chakra Petch',ui-monospace,monospace">
        <div style="font-size:13px;letter-spacing:0.3em;color:#8b93a3;text-transform:uppercase">Demolition Sandbox</div>
        <div style="font-size:44px;font-weight:700;color:#e8ecf4;letter-spacing:0.04em;margin-top:4px">BLOCK<em style="color:#ffb020;font-style:normal">BURB</em></div>
        <div style="margin:18px auto 0;width:180px;height:3px;background:#1a1f29;border-radius:2px;overflow:hidden">
          <div style="width:40%;height:100%;background:#ffb020;border-radius:2px;animation:bbsw 1.1s ease-in-out infinite alternate"></div>
        </div>
      </div>
    </div>
    <style>@keyframes bbsw{from{margin-left:0}to{margin-left:60%}}</style>
    <!-- ui-root: all DOM overlay UI (preloader / menu / hud / settings) mounts here -->
    <div id="ui-root"></div>
    <!-- dev stats line — kept for the CDP smoke test; styled by the dev overlay -->
    <div id="hud"></div>
    <div id="fatal"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
