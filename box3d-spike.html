<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLOCKBURB — Box3D Spike</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0d12; }
      #app { width: 100%; height: 100%; }
      #hud {
        position: fixed; top: 10px; left: 10px; z-index: 10; pointer-events: none;
        color: #cfe8ff; font: 500 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        background: rgba(6, 10, 16, 0.66); padding: 8px 11px; border-radius: 6px;
        white-space: pre; border: 1px solid rgba(120, 180, 255, 0.18);
      }
      #fatal {
        position: fixed; inset: 0; display: none; place-items: center; z-index: 1000;
        color: #ff6a5e; background: rgba(5, 6, 9, 0.94);
        font: 500 15px/1.6 ui-monospace, monospace; padding: 24px; text-align: center; white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <div id="fatal"></div>
    <script type="module" src="/src/spike/main-spike.ts"></script>
  </body>
</html>
