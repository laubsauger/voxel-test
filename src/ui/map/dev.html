<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T70 map dev — BLOCKBURB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #232a33 url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><rect width="40" height="40" fill="%23232a33"/><rect width="20" height="20" fill="%23273039"/><rect x="20" y="20" width="20" height="20" fill="%23273039"/></svg>');
      }
      #dev-bar {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 99;
        display: flex;
        gap: 8px;
        font: 12px 'Chakra Petch', sans-serif;
      }
      #dev-bar button {
        padding: 6px 12px;
        background: rgba(11, 15, 21, 0.8);
        color: #edf3f9;
        border: 1px solid rgba(255, 255, 255, 0.15);
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div id="dev-bar">
      <button id="btn-map">Toggle map (M)</button>
      <button id="btn-walk">Walk</button>
    </div>
    <div id="ui-root"></div>
    <script type="module" src="./dev.ts"></script>
  </body>
</html>
